//  ФИНАЛЬНАЯ АНИМАЦИЯ ПОБЕДЫ
// ══════════════════════════════════════════
let winAnim = null;

// ═══════════════════════════════════════════════════════
//  ФИНАЛЬНАЯ АНИМАЦИЯ
//  Фазы (кадры @ 60fps):
//  0-40   : фон + лучи появляются
//  0-90   : стол+стул спускаются сверху
//  60-140 : герой прыгает и машет внизу
//  140-200: герой идёт за стол и садится
//  200-260: герой бьёт молотком, искры, текст
//  260-310: пауза, показываем кнопку
// ═══════════════════════════════════════════════════════
function startWinAnimation(finalScore){
  winAnim = { frame:0, score:finalScore, done:false, fw:[] };
  function winLoop(){
    if(!winAnim||winAnim.done) return;
    winAnim.frame++;
    drawWinScene();
    if(winAnim.frame < 310){
      requestAnimationFrame(winLoop);
    } else {
      winAnim.done=true;
      const msg=document.getElementById('message');
      msg.style.display='block';
      msg.innerHTML=
        `<button id="startBtn" onclick="startGame()">НОВОЕ ДЕЛО</button>`
        +`<p style="color:#5a4a20;font-size:0.85rem;margin-top:14px;letter-spacing:0.12em">Все дела закрыты и сданы в архив!</p>`
        +`<h2 style="margin-top:8px">🏆 ДЕЛО ВЫИГРАНО!</h2>`;
    }
  }
  requestAnimationFrame(winLoop);
}

// Плавная функция ease-out cubic
function easeOut(t){ return 1-Math.pow(1-Math.min(1,t),3); }
function easeInOut(t){ t=Math.min(1,t); return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

function drawWinScene(){
  const f = winAnim.frame;
  ctx.clearRect(0,0,W,H);

  // ── Фон зала суда ──────────────────────────────────
  ctx.fillStyle='#1e1a0e'; ctx.fillRect(0,0,W,H);
  // Деревянные панели на стенах
  for(let i=0;i<6;i++){
    ctx.fillStyle=i%2===0?'#2a2010':'#241c0c';
    ctx.fillRect(i*(W/6),0,W/6,H);
  }
  // Горизонтальные полосы паркета внизу
  ctx.fillStyle='#2e2210'; ctx.fillRect(0,H*0.7,W,H*0.3);
  for(let i=0;i<8;i++){
    ctx.strokeStyle='#3a2c14'; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,H*0.7+i*14);ctx.lineTo(W,H*0.7+i*14);ctx.stroke();
  }
  // Золотые лучи (слабые, только первые 60 кадров нарастают)
  const rayAlpha = Math.min(0.06, (f/60)*0.06);
  ctx.save(); ctx.translate(W/2,H*0.45);
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2+f*0.006;
    ctx.fillStyle=`rgba(201,168,76,${rayAlpha})`;
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*W,Math.sin(a)*W);
    ctx.lineTo(Math.cos(a+0.2)*W,Math.sin(a+0.2)*W);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // ── Фейерверки ─────────────────────────────────────
  updateFireworks(f);
  drawFireworks();

  // ── Стол и стул спускаются ─────────────────────────
  // f=0..90: easeOut спуск
  const benchProg = easeOut(f/90);
  const BENCH_FINAL_Y = H*0.34;
  const benchY = -300 + benchProg*(BENCH_FINAL_Y+300);

  const TDEPTH=70;
  // Герой сидит в два раза выше — поднимаем на 60px относительно столешницы
  const HERO_DESK_Y = benchY + 4; // низ тела на уровне жёлтой полосы над зелёным сукном

  const HERO_FLOOR = H*0.82;

  drawBenchAndChair(W/2, benchY);

  let heroX, heroY, waveAngle, hammerT, sitting;

  if(f < 60){
    heroX = W/2; heroY = H+80; waveAngle=0; hammerT=0; sitting=false;
  } else if(f < 150){
    heroX = W/2;
    const jumpPhase = (f-60)/90;
    const jumpY = Math.abs(Math.sin(jumpPhase*Math.PI*3))*(-50);
    heroY = HERO_FLOOR + jumpY;
    waveAngle = Math.sin((f-60)*0.28)*1.1;
    hammerT=0; sitting=false;
  } else if(f < 210){
    const walkProg = easeInOut((f-150)/60);
    heroX = W/2;
    heroY = HERO_FLOOR + walkProg*(HERO_DESK_Y - HERO_FLOOR);
    waveAngle=0; hammerT=0; sitting=(walkProg>0.85);
  } else {
    heroX = W/2;
    heroY = HERO_DESK_Y;
    waveAngle=0;
    const hamProg = (f-210)/50;
    hammerT = Math.min(1, hamProg);
    sitting=true;
  }

  // Герой поверх фасада, под столешницей
  drawWinHero(heroX, heroY, waveAngle, hammerT, sitting, benchY);

  // Столешница поверх героя
  drawTableTop(W/2, benchY);

  // ── Текст только внизу ─────────────────────────────
  if(f > 220){
    const tAlpha = Math.min(1,(f-220)/30);
    ctx.save(); ctx.globalAlpha=tAlpha;
    ctx.textAlign='center'; ctx.shadowBlur=0;

    // Только счёт внизу (надпись убрана с canvas)
    const sc = winAnim.score;
    if(typeof sc==='number' && !isNaN(sc)){
      ctx.font='bold 20px "Playfair Display",serif';
      ctx.fillStyle='#1a1208';
      ctx.fillText(`Счёт: ${sc}`, W/2, H-28);
    }
    ctx.restore();
  }
}

// ── Фейерверки ────────────────────────────────────────
const FW_COLORS = [
  '#ff4444','#ff8844','#ffdd22','#44ff88',
  '#44aaff','#aa44ff','#ff44aa','#ffffff',
  '#c9a84c','#88ffee',
];

function spawnFirework(x, y){
  if(!winAnim) return;
  const particles = [];
  const count = 22 + Math.floor(Math.random()*14);
  const color = FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
  const color2 = FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
  for(let i=0;i<count;i++){
    const angle = (i/count)*Math.PI*2 + Math.random()*0.3;
    const speed = 1.8 + Math.random()*3.5;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 1.5,
      life: 1,
      decay: 0.022 + Math.random()*0.018,
      r: 1.5 + Math.random()*2,
      color: Math.random()<0.5 ? color : color2,
      tail: [],
    });
  }
  // Фонтанчик — несколько снопов вверх
  const fountCount = 8;
  for(let i=0;i<fountCount;i++){
    const angle = -Math.PI/2 + (Math.random()-0.5)*0.8;
    const speed = 2.5 + Math.random()*3;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1,
      decay: 0.018 + Math.random()*0.015,
      r: 1.2 + Math.random()*1.5,
      color: '#fff8e0',
      fountain: true,
    });
  }
  winAnim.fw.push({ particles, done:false });
}

function updateFireworks(f){
  if(!winAnim) return;

  // Запускаем залпы: начиная с f=30, периодически
  // Левая сторона: x ≈ W*0.12..0.28, правая: x ≈ W*0.72..0.88
  // y ≈ H*0.05..0.22 (верхняя часть экрана)
  const launchFrames = [30,48,65,80,100,120,145,165,190,215,240,270];
  if(launchFrames.includes(f)){
    const side = f % 2 === 0 ? 'left' : 'right';
    const x = side==='left'
      ? W*0.08 + Math.random()*W*0.22
      : W*0.70 + Math.random()*W*0.22;
    const y = H*0.04 + Math.random()*H*0.18;
    spawnFirework(x, y);
    // Иногда двойной залп
    if(Math.random()<0.35){
      const x2 = side==='left'
        ? W*0.08 + Math.random()*W*0.22
        : W*0.70 + Math.random()*W*0.22;
      const y2 = H*0.04 + Math.random()*H*0.18;
      spawnFirework(x2, y2);
    }
  }

  // Обновляем частицы
  for(const fw of winAnim.fw){
    let allDead = true;
    for(const p of fw.particles){
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.fountain ? 0.12 : 0.06; // гравитация
      p.vx *= 0.97;
      p.life -= p.decay;
      if(p.life > 0) allDead = false;
    }
    fw.done = allDead;
  }
  // Убираем завершённые
  winAnim.fw = winAnim.fw.filter(fw=>!fw.done);
}

function drawFireworks(){
  if(!winAnim || !winAnim.fw.length) return;
  ctx.save();
  for(const fw of winAnim.fw){
    for(const p of fw.particles){
      if(p.life <= 0) continue;
      ctx.globalAlpha = Math.pow(p.life, 0.7);
      // Блик
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── Рисует стул (сначала, он сзади) и стол (фасад)
function drawBenchAndChair(cx, topY){
  ctx.save();

  // Размеры стола
  const tW=300, tDepth=70, tH=120;
  const sk=28; // перспективный скос

  // === СТУЛ — позади стола ===
  const chX=cx, chY=topY-8;
  const chW=80, chH=130, chSeatH=14;

  // Ножки стула (4 штуки)
  ctx.fillStyle='#7a5020';
  [[chX-28,chY+chH],[chX+28,chY+chH],[chX-22,chY+chH+5],[chX+22,chY+chH+5]].forEach(([lx,ly])=>{
    ctx.fillRect(lx-4, ly-chH+chSeatH, 8, chH-chSeatH);
  });

  // Сиденье
  const sGrad=ctx.createLinearGradient(chX-chW/2,chY+chSeatH,chX+chW/2,chY+chSeatH+chSeatH);
  sGrad.addColorStop(0,'#c8a060'); sGrad.addColorStop(1,'#8a6030');
  ctx.fillStyle=sGrad;
  ctx.beginPath(); ctx.roundRect(chX-chW/2, chY, chW, chSeatH, 3); ctx.fill();
  ctx.strokeStyle='#6a4010'; ctx.lineWidth=1; ctx.stroke();

  // Спинка — высокая, с фигурным верхом
  const spW=70, spH=110;
  const spGrad=ctx.createLinearGradient(chX-spW/2,chY-spH,chX+spW/2,chY);
  spGrad.addColorStop(0,'#e8c880'); spGrad.addColorStop(0.3,'#c8a060'); spGrad.addColorStop(1,'#8a6030');
  ctx.fillStyle=spGrad;
  // Форма спинки — трапеция с арочным верхом
  ctx.beginPath();
  ctx.moveTo(chX-spW/2, chY);
  ctx.lineTo(chX+spW/2, chY);
  ctx.lineTo(chX+spW/2-5, chY-spH+20);
  ctx.quadraticCurveTo(chX+spW/2-5, chY-spH, chX, chY-spH-10); // арка
  ctx.quadraticCurveTo(chX-spW/2+5, chY-spH, chX-spW/2+5, chY-spH+20);
  ctx.closePath();
  ctx.fill(); ctx.strokeStyle='#6a4010'; ctx.lineWidth=1.5; ctx.stroke();

  // Узор на спинке
  ctx.strokeStyle='rgba(255,220,120,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(chX-24, chY-spH+15, 48, spH-25, 4); ctx.stroke();
  ctx.fillStyle='#c9a84c';
  ctx.beginPath(); ctx.arc(chX, chY-spH+8, 5, 0, Math.PI*2); ctx.fill();
  // Вертикальная планка посередине
  ctx.strokeStyle='rgba(255,220,120,0.4)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(chX, chY-10); ctx.lineTo(chX, chY-spH+22); ctx.stroke();

  // === СТОЛ — фасад (боковая и передняя грани) ===
  // Левая боковая грань
  const leftGrad=ctx.createLinearGradient(cx-tW/2-sk, topY, cx-tW/2, topY+tDepth);
  leftGrad.addColorStop(0,'#8a6030'); leftGrad.addColorStop(1,'#6a4820');
  ctx.fillStyle=leftGrad;
  ctx.beginPath();
  ctx.moveTo(cx-tW/2,    topY);
  ctx.lineTo(cx-tW/2-sk, topY+tDepth);
  ctx.lineTo(cx-tW/2-sk, topY+tDepth+tH);
  ctx.lineTo(cx-tW/2,    topY+tH);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#6a4010'; ctx.lineWidth=1.5; ctx.stroke();

  // Правая боковая грань (симметрично)
  const rightGrad=ctx.createLinearGradient(cx+tW/2+sk, topY, cx+tW/2, topY+tDepth);
  rightGrad.addColorStop(0,'#8a6030'); rightGrad.addColorStop(1,'#6a4820');
  ctx.fillStyle=rightGrad;
  ctx.beginPath();
  ctx.moveTo(cx+tW/2,    topY);
  ctx.lineTo(cx+tW/2+sk, topY+tDepth);
  ctx.lineTo(cx+tW/2+sk, topY+tDepth+tH);
  ctx.lineTo(cx+tW/2,    topY+tH);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#6a4010'; ctx.lineWidth=1.5; ctx.stroke();

  // Передняя грань фасада
  const fGrad=ctx.createLinearGradient(cx,topY+tDepth,cx,topY+tDepth+tH);
  fGrad.addColorStop(0,'#c8a070'); fGrad.addColorStop(0.6,'#a87840'); fGrad.addColorStop(1,'#7a5020');
  ctx.fillStyle=fGrad;
  ctx.beginPath();
  ctx.moveTo(cx-tW/2-sk, topY+tDepth);
  ctx.lineTo(cx+tW/2+sk, topY+tDepth);
  ctx.lineTo(cx+tW/2+sk, topY+tDepth+tH);
  ctx.lineTo(cx-tW/2-sk, topY+tDepth+tH);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#7a5010'; ctx.lineWidth=1.5; ctx.stroke();

  // Панели на фасаде
  ctx.strokeStyle='rgba(255,220,150,0.28)'; ctx.lineWidth=1.2;
  [-100,-34,34,100].forEach(px=>{
    ctx.beginPath();ctx.roundRect(cx+px-28,topY+tDepth+14,56,tH-28,4);ctx.stroke();
  });
  // Герб по центру фасада
  ctx.fillStyle='rgba(201,168,76,0.22)';
  ctx.beginPath(); ctx.arc(cx,topY+tDepth+tH/2,22,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(201,168,76,0.4)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,topY+tDepth+tH/2,22,0,Math.PI*2); ctx.stroke();
  ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(201,168,76,0.6)';
  ctx.fillText('⚖',cx,topY+tDepth+tH/2+1);

  ctx.restore();
}

// ── Только столешница (рисуется поверх героя) ──────────
function drawTableTop(cx, topY){
  const tW=300, tDepth=70, sk=28;
  ctx.save();

  // Тень под столом
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx, topY+tDepth+125, tW/2+40, 16, 0, 0, Math.PI*2);
  ctx.fill();

  // Столешница — верхняя трапеция
  const tGrad=ctx.createLinearGradient(cx-tW/2,topY,cx-tW/2,topY+tDepth);
  tGrad.addColorStop(0,'#ddc090'); tGrad.addColorStop(0.5,'#c8a860'); tGrad.addColorStop(1,'#a88040');
  ctx.fillStyle=tGrad;
  ctx.beginPath();
  ctx.moveTo(cx-tW/2,    topY);
  ctx.lineTo(cx+tW/2,    topY);
  ctx.lineTo(cx+tW/2+sk, topY+tDepth);
  ctx.lineTo(cx-tW/2-sk, topY+tDepth);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#8a6020'; ctx.lineWidth=1.5; ctx.stroke();

  // Зелёное сукно
  const clothGrad=ctx.createLinearGradient(cx-tW/2+10,topY+4,cx-tW/2+10,topY+tDepth-6);
  clothGrad.addColorStop(0,'#386040'); clothGrad.addColorStop(1,'#2a4830');
  ctx.fillStyle=clothGrad;
  ctx.beginPath();
  ctx.moveTo(cx-tW/2+10,    topY+4);
  ctx.lineTo(cx+tW/2-10,    topY+4);
  ctx.lineTo(cx+tW/2-10+sk*0.85, topY+tDepth-6);
  ctx.lineTo(cx-tW/2+10-sk*0.85, topY+tDepth-6);
  ctx.closePath(); ctx.fill();
  // Рамка сукна
  ctx.strokeStyle='#c9a84c66'; ctx.lineWidth=1; ctx.stroke();

  // Книги на столе (стопка слева)
  const bkX=cx-80, bkY=topY+6;
  [[14,'#8B1A1A'],[12,'#1A3A6B'],[10,'#1A5C2A']].forEach(([bh,bc],i)=>{
    ctx.fillStyle=bc;
    ctx.beginPath();
    ctx.moveTo(bkX-18,    bkY-i*bh+2);
    ctx.lineTo(bkX+18,    bkY-i*bh+2);
    ctx.lineTo(bkX+18+4,  bkY-i*bh+bh+4);
    ctx.lineTo(bkX-18-4,  bkY-i*bh+bh+4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.8; ctx.stroke();
  });
  // Фемида справа
  const fX=cx+85, fY=topY+8;
  // Постамент
  ctx.fillStyle='#c8a060';
  ctx.fillRect(fX-10,fY+28,20,10);
  ctx.fillRect(fX-8, fY+20,16,10);
  // Фигура (силуэт)
  ctx.fillStyle='#d4c090';
  // Тело
  ctx.beginPath();
  ctx.moveTo(fX-7,fY+20);
  ctx.quadraticCurveTo(fX-9,fY+10,fX-4,fY+2);
  ctx.lineTo(fX+4,fY+2);
  ctx.quadraticCurveTo(fX+9,fY+10,fX+7,fY+20);
  ctx.closePath(); ctx.fill();
  // Голова
  ctx.beginPath(); ctx.arc(fX,fY,6,0,Math.PI*2); ctx.fill();
  // Весы
  ctx.strokeStyle='#c9a84c'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(fX-12,fY+5);ctx.lineTo(fX+12,fY+5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fX,fY+2);ctx.lineTo(fX,fY+8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fX-12,fY+5);ctx.lineTo(fX-14,fY+11);ctx.lineTo(fX-10,fY+11);ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.moveTo(fX+12,fY+5);ctx.lineTo(fX+14,fY+11);ctx.lineTo(fX+10,fY+11);ctx.closePath();ctx.stroke();
  // Повязка на глазах
  ctx.fillStyle='#c8a060';
  ctx.fillRect(fX-5,fY-1,10,3);

  ctx.restore();
}

// ── Герой в финальной анимации ─────────────────────────
function drawWinHero(ax, ay, waveAngle, hammerT, sitting, benchY){
  ctx.save();

  if(!sitting){
    // Ноги — прыжок/ходьба
    ctx.strokeStyle='#22223a'; ctx.lineWidth=4; ctx.lineCap='round';
    const legSway = waveAngle*0.4;
    ctx.beginPath();ctx.moveTo(ax-6,ay-4);ctx.lineTo(ax-8+legSway*8,ay+14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax+6,ay-4);ctx.lineTo(ax+8-legSway*8,ay+14);ctx.stroke();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.ellipse(ax-8+legSway*8,ay+15,5,3,legSway*0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ax+8-legSway*8,ay+15,5,3,-legSway*0.3,0,Math.PI*2);ctx.fill();
  }

  // Мантия
  ctx.fillStyle='#12122a';
  ctx.beginPath();
  ctx.moveTo(ax-18,ay-2);ctx.lineTo(ax-13,ay-36);ctx.lineTo(ax+13,ay-36);ctx.lineTo(ax+18,ay-2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#2a2a50'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(ax-10,ay-34);ctx.lineTo(ax-14,ay-4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ax+10,ay-34);ctx.lineTo(ax+14,ay-4);ctx.stroke();

  // Жабо
  ctx.fillStyle='#f0ece0';
  ctx.beginPath();
  ctx.moveTo(ax-7,ay-36);ctx.quadraticCurveTo(ax-4,ay-28,ax,ay-25);
  ctx.quadraticCurveTo(ax+4,ay-28,ax+7,ay-36);ctx.closePath();ctx.fill();

  // Руки
  let lHx,lHy,rHx,rHy;
  if(sitting && hammerT>0){
    // Правая рука — поднята с молотком (замах → удар)
    const swing = Math.sin(hammerT*Math.PI); // 0→1→0
    rHx = ax+16; rHy = ay-28-swing*18;
    lHx = ax-20; lHy = ay-18;
  } else if(waveAngle!==0){
    // Обе машут в разные стороны
    lHx = ax-22+Math.cos(-0.5+waveAngle+1.2)*20;
    lHy = ay-16-Math.sin(-0.5+waveAngle+1.2)*26;
    rHx = ax+22-Math.cos(0.5+waveAngle+1.2)*20;
    rHy = ay-16-Math.sin(0.5+waveAngle+1.2)*26;
  } else {
    lHx=ax-22; lHy=ay-16;
    rHx=ax+22; rHy=ay-16;
  }

  ctx.strokeStyle='#12122a'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(ax-13,ay-26);ctx.lineTo(lHx,lHy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ax+13,ay-26);ctx.lineTo(rHx,rHy);ctx.stroke();

  // Кисти
  ctx.fillStyle='#f5c8a0';
  ctx.beginPath();ctx.arc(lHx,lHy,3.5,0,Math.PI*2);ctx.fill();

  // Молоток в правой руке при ударе
  if(sitting && hammerT>0){
    ctx.save();
    const swing = Math.sin(hammerT*Math.PI);
    const hamAngle = -1.2+swing*2.2; // замах → удар → откат
    ctx.translate(rHx, rHy);
    ctx.rotate(hamAngle);
    ctx.strokeStyle='#8B5E3C'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,18);ctx.stroke();
    const hG=ctx.createLinearGradient(-10,-6,10,-6);
    hG.addColorStop(0,'#c9a84c');hG.addColorStop(0.5,'#f0d878');hG.addColorStop(1,'#7a5a18');
    ctx.fillStyle=hG;
    ctx.beginPath();ctx.roundRect(-11,-10,22,8,2);ctx.fill();
    ctx.strokeStyle='#8a6020'; ctx.lineWidth=0.8; ctx.stroke();
    // Искры при ударе
    if(hammerT>0.45 && hammerT<0.7){
      const sp=(hammerT-0.45)/0.25;
      for(let i=0;i<8;i++){
        const sa=i/8*Math.PI*2+sp;
        ctx.strokeStyle=`rgba(255,230,60,${0.9-sp})`;
        ctx.lineWidth=1.8;
        ctx.beginPath();ctx.moveTo(0,8);
        ctx.lineTo(Math.cos(sa)*16*sp,8+Math.sin(sa)*10*sp);
        ctx.stroke();
      }
    }
    ctx.restore();
  } else {
    ctx.fillStyle='#f5c8a0';
    ctx.beginPath();ctx.arc(rHx,rHy,3.5,0,Math.PI*2);ctx.fill();
  }

  // Голова
  ctx.fillStyle='#f5c8a0';
  ctx.fillRect(ax-4,ay-44,8,8);
  ctx.beginPath();ctx.ellipse(ax,ay-50,10,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8b090';
  ctx.beginPath();ctx.ellipse(ax-10,ay-50,3,4,-0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ax+10,ay-50,3,4,0.3,0,Math.PI*2);ctx.fill();

  // Парик — до уровня воротника
  ctx.fillStyle='#e8e4d8';
  ctx.beginPath();
  ctx.moveTo(ax-8,ay-60);ctx.bezierCurveTo(ax-18,ay-56,ax-20,ay-48,ax-18,ay-42);
  ctx.bezierCurveTo(ax-20,ay-38,ax-16,ay-37,ax-18,ay-37);
  ctx.lineTo(ax-10,ay-37);ctx.bezierCurveTo(ax-10,ay-37,ax-8,ay-40,ax-10,ay-42);
  ctx.bezierCurveTo(ax-8,ay-48,ax-6,ay-55,ax-8,ay-60);
  ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(ax+8,ay-60);ctx.bezierCurveTo(ax+18,ay-56,ax+20,ay-48,ax+18,ay-42);
  ctx.bezierCurveTo(ax+20,ay-38,ax+16,ay-37,ax+18,ay-37);
  ctx.lineTo(ax+10,ay-37);ctx.bezierCurveTo(ax+10,ay-37,ax+8,ay-40,ax+10,ay-42);
  ctx.bezierCurveTo(ax+8,ay-48,ax+6,ay-55,ax+8,ay-60);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c8c0a8';ctx.lineWidth=1;ctx.lineCap='round';
  for(let i=0;i<3;i++){
    const ox=-18+i*4;
    ctx.beginPath();ctx.moveTo(ax+ox,ay-57);ctx.quadraticCurveTo(ax+ox-3,ay-50,ax+ox,ay-44);
    ctx.quadraticCurveTo(ax+ox+2,ay-40,ax+ox,ay-37);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax-ox,ay-57);ctx.quadraticCurveTo(ax-ox+3,ay-50,ax-ox,ay-44);
    ctx.quadraticCurveTo(ax-ox-2,ay-40,ax-ox,ay-37);ctx.stroke();
  }

  // Глаза
  if(waveAngle!==0){
    ctx.strokeStyle='#2a1a0a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(ax-4,ay-51,3,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();
    ctx.beginPath();ctx.arc(ax+4,ay-51,3,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();
  } else {
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(ax-4,ay-51,2.8,3.2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ax+4,ay-51,2.8,3.2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a1a0a';
    ctx.beginPath();ctx.arc(ax-3.5,ay-51,1.8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ax+4.5,ay-51,1.8,0,Math.PI*2);ctx.fill();
  }

  // Улыбка
  ctx.strokeStyle='#8b2010';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(ax,ay-45,5,0.1,Math.PI-0.1);ctx.stroke();

  // Шапочка
  const hTW=28,hBW=8,hTH=12,hTop=ay-75;
  ctx.fillStyle='#12122a';
  ctx.fillRect(ax-hTW,hTop,hTW*2,4);
  ctx.fillStyle='#1a1a32';
  ctx.beginPath();
  ctx.moveTo(ax-hTW,hTop+4);ctx.lineTo(ax+hTW,hTop+4);
  ctx.lineTo(ax+hBW,hTop+4+hTH);ctx.lineTo(ax-hBW,hTop+4+hTH);
  ctx.closePath();ctx.fill();

  ctx.restore();
}

function endGame(win){
  gameRunning=false;
  // Захватываем счёт сразу — до любого сброса
  const finalScore = (typeof score==='number' && !isNaN(score)) ? score : 0;
  if(win){
    document.getElementById('message').style.display='none';
    startWinAnimation(finalScore);
  } else {
    const msg=document.getElementById('message');
    msg.style.display='block';
    msg.innerHTML=`<h2>⚖ ДЕЛО ЗАКРЫТО</h2>`
      +`<p>Адвокат не выдержал</p>`
      +`<p style="color:#c9a84c;font-size:1.4rem;margin-top:10px;font-family:'Playfair Display',serif">Счёт: ${finalScore}</p>`
      +`<button id="startBtn" onclick="startGame()">АПЕЛЛЯЦИЯ</button>`;
  }
}

// ── Dev panel: долгий тап на заголовке ──────────────
(function(){
  const trigger = document.getElementById('devTrigger');
  const panel   = document.getElementById('devPanel');
  const btns    = document.getElementById('devBtns');
  let holdTimer = null;

  // Генерируем кнопки уровней
  for(let i=2;i<=10;i++){
    const b=document.createElement('button');
    b.className='devBtn';
    b.textContent='Уровень '+i;
    b.onclick=(function(lvl){ return function(){
      closeDevPanel();
      startGame(lvl);
    };})(i);
    btns.appendChild(b);
  }

  function openDevPanel(){
    panel.style.display='block';
  }
  window.closeDevPanel=function(){
    panel.style.display='none';
  };

  // Долгий тап / долгое нажатие — 600мс
  trigger.addEventListener('pointerdown',()=>{
    holdTimer=setTimeout(openDevPanel, 600);
  });
  trigger.addEventListener('pointerup',  ()=>clearTimeout(holdTimer));
  trigger.addEventListener('pointerleave',()=>clearTimeout(holdTimer));

  // Закрыть по тапу вне панели
  document.addEventListener('pointerdown', e=>{
    if(panel.style.display==='block' && !panel.contains(e.target) && e.target!==trigger){
      closeDevPanel();
    }
  });
})();
</script>
